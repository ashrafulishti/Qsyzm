services:
  - type: web
    name: qsyzm
    runtime: python
    region: oregon      # change to: frankfurt | singapore | ohio as needed
    plan: free          # upgrade to 'starter' or higher for production

    # Pin Python — prevents Render from defaulting to 3.14+
    pythonVersion: "3.12.8"

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      # ----------------------------------------------------------------
      # Qsyzm secret keys — DO NOT put real values here.
      # Set each one in:
      #   Render Dashboard → your service → Environment → Add Env Var
      # ----------------------------------------------------------------
      - key: QSYZM_KEY_L0_B1
        sync: false
      - key: QSYZM_KEY_L0_B2
        sync: false
      - key: QSYZM_KEY_L0_B3
        sync: false
      - key: QSYZM_KEY_L0_B4
        sync: false
      - key: QSYZM_KEY_L0_B5
        sync: false

      - key: QSYZM_KEY_L1_B1
        sync: false
      - key: QSYZM_KEY_L1_B2
        sync: false
      - key: QSYZM_KEY_L1_B3
        sync: false
      - key: QSYZM_KEY_L1_B4
        sync: false
      - key: QSYZM_KEY_L1_B5
        sync: false

      - key: QSYZM_KEY_L2_B1
        sync: false
      - key: QSYZM_KEY_L2_B2
        sync: false
      - key: QSYZM_KEY_L2_B3
        sync: false
      - key: QSYZM_KEY_L2_B4
        sync: false
      - key: QSYZM_KEY_L2_B5
        sync: false
